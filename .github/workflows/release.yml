name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Write OAuth credentials
        shell: bash
        run: |
          mkdir -p src-tauri/credentials
          echo '${{ secrets.OAUTH_JSON }}' > src-tauri/credentials/oauth.json

      - name: Install dependencies
        run: npm install

      - name: Prepare release notes
        id: notes
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"   # v1.0.3 -> 1.0.3
          FILE="docs/whatsnew/${VERSION}.md"
          {
            echo 'body<<RELEASE_NOTES_EOF'
            if [ -f "$FILE" ]; then
              cat "$FILE"
              echo
              echo '---'
            fi
            echo '下载说明见 README。'
            echo 'RELEASE_NOTES_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "tester-app ${{ github.ref_name }}"
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }} --bundles ${{ matrix.platform == 'macos-latest' && 'dmg' || 'nsis' }}
